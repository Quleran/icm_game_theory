<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceBattle – симулятор ценообразования</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>⚡ PriceBattle</h1>
    <p>Введите матрицы прибыли для двух продавцов. Размерность можно менять от 2 до 8.</p>

    <!-- Управление размерностью -->
    <div class="controls">
        <label for="sizeSelect">Размер матриц (n):</label>
        <select id="sizeSelect">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8" selected>8</option>
        </select>
        <button id="applySizeBtn" class="btn-secondary">Применить</button>
        <button id="exampleBtn" class="btn-secondary">Заполнить пример (2×2)</button>
    </div>

    <!-- Таблицы матриц -->
    <div class="matrix-container">
        <div class="matrix-wrapper">
            <h3>Матрица A (прибыль игрока 1)</h3>
            <table id="matrixA">
                <tbody></tbody>
            </table>
        </div>
        <div class="matrix-wrapper">
            <h3>Матрица B (прибыль игрока 2)</h3>
            <table id="matrixB">
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Кнопки действий -->
    <div class="action-buttons">
        <button id="nashBtn" class="btn-primary">Рассчитать равновесие Нэша</button>
        <button id="marginBtn" class="btn-primary">Оптимизировать маржу</button>
    </div>

    <!-- Результаты -->
    <div id="resultContainer">
        <h3>Результат</h3>
        <div id="result" class="result">Здесь появится ответ</div>
    </div>
</div>

<script>
    // --- Глобальные переменные ---
    let currentSize = 8;
    let currentA = [];
    let currentB = [];

    // --- Элементы DOM ---
    const sizeSelect = document.getElementById('sizeSelect');
    const applySizeBtn = document.getElementById('applySizeBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const matrixA = document.getElementById('matrixA').querySelector('tbody');
    const matrixB = document.getElementById('matrixB').querySelector('tbody');
    const nashBtn = document.getElementById('nashBtn');
    const marginBtn = document.getElementById('marginBtn');
    const resultDiv = document.getElementById('result');
    const matrixWrapperA = document.getElementById('matrixA').closest('.matrix-wrapper');
    const matrixWrapperB = document.getElementById('matrixB').closest('.matrix-wrapper');

    // --- Функции создания таблиц ---

    function createTable(tbody, rows, cols, defaultValue = '0') {
        tbody.innerHTML = '';
        for (let i = 0; i < rows; i++) {
            const tr = document.createElement('tr');
            for (let j = 0; j < cols; j++) {
                const td = document.createElement('td');
                const input = document.createElement('input');
                input.type = 'number';
                input.step = '0.1';
                input.value = defaultValue;
                input.dataset.row = i;
                input.dataset.col = j;
                td.appendChild(input);
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
    }

    function rebuildMatrices(size) {
        createTable(matrixA, size, size);
        createTable(matrixB, size, size);
        currentSize = size;

        [matrixWrapperA, matrixWrapperB].forEach(wrapper => {
            wrapper.className = 'matrix-wrapper';
            if (size >= 7) {
                wrapper.classList.add('size-' + size);
            }
        });
    }

    // --- Чтение данных из таблиц ---

    function getMatrixFromTable(tbody) {
        const rows = tbody.querySelectorAll('tr');
        const matrix = [];
        rows.forEach(tr => {
            const row = [];
            const inputs = tr.querySelectorAll('input');
            inputs.forEach(inp => {
                row.push(parseFloat(inp.value) || 0);
            });
            matrix.push(row);
        });
        return matrix;
    }

    // --- Вспомогательная функция для вычисления ожидаемой прибыли ---

    function computeExpectedPayoff(A, B, x, y) {
        let payoff1 = 0, payoff2 = 0;
        const n = A.length;
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n; j++) {
                payoff1 += x[i] * A[i][j] * y[j];
                payoff2 += x[i] * B[i][j] * y[j];
            }
        }
        return { payoff1, payoff2 };
    }

    // --- Функция для красивого отображения результатов (без вероятностей) ---

    function formatResult(data, A, B) {
        let html = '';

        // Равновесия Нэша
        if (data.equilibria && data.equilibria.length > 0) {
            html += '<div class="result-section">';
            html += `<h4 class="result-title">🎯 Равновесия Нэша (${data.equilibria.length}):</h4>`;
            data.equilibria.forEach((eq, index) => {
                const x = eq.strategy_a;
                const y = eq.strategy_b;
                const payoffs = computeExpectedPayoff(A, B, x, y);

                const maxA = Math.max(...x);
                const choiceA = x.indexOf(maxA) + 1;
                const maxB = Math.max(...y);
                const choiceB = y.indexOf(maxB) + 1;

                html += `<div class="equilibrium-item">`;
                html += `<div class="equilibrium-number">Равновесие ${index + 1}:</div>`;

                html += `<div class="strategy-row">`;
                html += `<span class="player-label">Игрок 1:</span>`;
                html += `<span class="strategy-choice">выбирает стратегию <strong>${choiceA}</strong></span>`;
                html += `</div>`;

                html += `<div class="strategy-row">`;
                html += `<span class="player-label">Игрок 2:</span>`;
                html += `<span class="strategy-choice">выбирает стратегию <strong>${choiceB}</strong></span>`;
                html += `</div>`;

                html += `<div class="payoff-row">`;
                html += `<span class="payoff-label">Ожидаемая прибыль:</span>`;
                html += `<span class="payoff-values">Игрок 1: <strong>${payoffs.payoff1.toFixed(2)}</strong>, Игрок 2: <strong>${payoffs.payoff2.toFixed(2)}</strong></span>`;
                html += `</div>`;

                html += `</div>`;
            });
            html += '</div>';
        }

        // Оптимизация маржи
        if (data.optimal_margin !== undefined && data.strategy_a && data.strategy_b) {
            const x = data.strategy_a;
            const y = data.strategy_b;
            const payoffs = computeExpectedPayoff(A, B, x, y);

            const maxA = Math.max(...x);
            const choiceA = x.indexOf(maxA) + 1;
            const maxB = Math.max(...y);
            const choiceB = y.indexOf(maxB) + 1;

            html += '<div class="result-section">';
            html += '<h4 class="result-title">💰 Оптимальная маржа (гарантированная прибыль):</h4>';
            html += `<div class="margin-value">Маржа: <strong>${data.optimal_margin.toFixed(2)}</strong></div>`;

            html += `<div class="equilibrium-item">`;
            html += `<div class="strategy-row">`;
            html += `<span class="player-label">Игрок 1:</span>`;
            html += `<span class="strategy-choice">выбирает стратегию <strong>${choiceA}</strong></span>`;
            html += `</div>`;

            html += `<div class="strategy-row">`;
            html += `<span class="player-label">Игрок 2:</span>`;
            html += `<span class="strategy-choice">выбирает стратегию <strong>${choiceB}</strong></span>`;
            html += `</div>`;

            html += `<div class="payoff-row">`;
            html += `<span class="payoff-label">Ожидаемая прибыль (фактическая):</span>`;
            html += `<span class="payoff-values">Игрок 1: <strong>${payoffs.payoff1.toFixed(2)}</strong>, Игрок 2: <strong>${payoffs.payoff2.toFixed(2)}</strong></span>`;
            html += `</div>`;

            html += `</div>`;
            html += '</div>';
        }

        if (html === '') {
            html = '<span class="info">Нет данных для отображения.</span>';
        }
        return html;
    }

    // --- Отправка запроса ---

    async function sendRequest(url, data, A, B) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (!response.ok) {
                resultDiv.innerHTML = `<span class="error">Ошибка: ${result.detail || 'Неизвестная ошибка'}</span>`;
                return;
            }
            resultDiv.innerHTML = formatResult(result, A, B);
        } catch (e) {
            resultDiv.innerHTML = `<span class="error">Ошибка соединения: ${e.message}</span>`;
        }
    }

    // --- Обработчики событий ---

    applySizeBtn.addEventListener('click', () => {
        const newSize = parseInt(sizeSelect.value);
        if (newSize >= 2 && newSize <= 8) {
            rebuildMatrices(newSize);
        }
    });

    exampleBtn.addEventListener('click', () => {
        sizeSelect.value = '2';
        rebuildMatrices(2);
        const exampleA = [[10, 8], [12, 9]];
        const exampleB = [[10, 12], [8, 9]];
        const inputsA = matrixA.querySelectorAll('input');
        const inputsB = matrixB.querySelectorAll('input');
        let idx = 0;
        for (let i = 0; i < 2; i++) {
            for (let j = 0; j < 2; j++) {
                inputsA[idx].value = exampleA[i][j];
                inputsB[idx].value = exampleB[i][j];
                idx++;
            }
        }
    });

    nashBtn.addEventListener('click', () => {
        const A = getMatrixFromTable(matrixA);
        const B = getMatrixFromTable(matrixB);
        const n = A.length;
        if (A.some(row => row.length !== n) || B.some(row => row.length !== n)) {
            resultDiv.innerHTML = '<span class="error">Матрицы должны быть квадратными и одинакового размера.</span>';
            return;
        }
        currentA = A;
        currentB = B;
        sendRequest('/game/nash', { payoff_matrix_a: A, payoff_matrix_b: B }, A, B);
    });

    marginBtn.addEventListener('click', () => {
        const A = getMatrixFromTable(matrixA);
        const B = getMatrixFromTable(matrixB);
        const n = A.length;
        if (A.some(row => row.length !== n) || B.some(row => row.length !== n)) {
            resultDiv.innerHTML = '<span class="error">Матрицы должны быть квадратными и одинакового размера.</span>';
            return;
        }
        currentA = A;
        currentB = B;
        sendRequest('/optimize/margin', { payoff_matrix_a: A, payoff_matrix_b: B }, A, B);
    });

    // --- Инициализация ---
    rebuildMatrices(8);
</script>
</body>
</html>
